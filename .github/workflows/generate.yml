name: Generate Resume PDF

on:
  push:
    paths:
      - "resume.json"

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start RxResume stack
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "⏳ Giving services time to initialize..."
          sleep 15

      - name: Generate PDF
        run: |
          chmod +x scripts/export_pdf.sh
          bash scripts/export_pdf.sh resume.json output/resume.pdf

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      - name: Commit PDF to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/resume.pdf
          git diff --staged --quiet || git commit -m "ci: generate resume PDF [skip ci]"
          git push
