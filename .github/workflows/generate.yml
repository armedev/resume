name: Generate Resume PDF

on:
  push:
    tags:
      - "*"

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start RxResume stack
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "⏳ Giving services time to initialize..."
          sleep 15

      - name: Generate PDF
        run: |
          chmod +x scripts/export_pdf.sh
          bash scripts/export_pdf.sh resume.json output/resume.pdf

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down

      - name: Publish PDF to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/resume.pdf
