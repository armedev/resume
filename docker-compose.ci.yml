services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rxresume
      POSTGRES_USER: rxresume
      POSTGRES_PASSWORD: rxresume
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rxresume -d rxresume"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  chrome:
    image: ghcr.io/browserless/chromium:v2.18.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TIMEOUT: 30000
      CONCURRENT: 10
      TOKEN: chrome_token

  app:
    image: amruthpillai/reactive-resume:latest
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TZ: Etc/UTC
      APP_URL: http://localhost:3000
      PRINTER_ENDPOINT: ws://chrome:3000?token=chrome_token
      PRINTER_APP_URL: http://app:3000
      DATABASE_URL: postgresql://rxresume:rxresume@postgres:5432/rxresume
      AUTH_SECRET: this_is_a_local_ci_secret_32chars_ok
      STORAGE_ENDPOINT: minio
      STORAGE_PORT: 9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: default
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_URL: http://localhost:9000/default
      STORAGE_USE_SSL: "false"
      STORAGE_SKIP_BUCKET_CHECK: "false"
      DISABLE_SIGNUPS: "false"
      DISABLE_EMAIL_AUTH: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
